<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no">
  <title>আমার ফাইন্যান্স</title>
  <meta name="theme-color" content="#1b4332">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes"> 
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; background: #1b4332; }

    #app-frame {
      position: fixed; inset: 0; width: 100%; height: 100%;
      border: none; background: #f0f3f1;
    }

    /* ---------- লোডিং স্ক্রিন ---------- */
    #loading-screen {
      position: fixed; inset: 0; z-index: 999;
      background: linear-gradient(135deg, #1b4332, #2d6a4f);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      color: #fff; font-family: 'Hind Siliguri', sans-serif;
      transition: opacity 0.4s ease, visibility 0.4s ease;
    }
    #loading-screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

    .logo-emoji { font-size: 52px; margin-bottom: 14px; }
    .app-name { font-size: 20px; font-weight: 700; margin-bottom: 22px; letter-spacing: 0.5px; }

    .spinner {
      width: 34px; height: 34px; border: 4px solid rgba(255,255,255,0.25);
      border-top-color: #fff; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .load-msg { margin-top: 16px; font-size: 13px; opacity: 0.8; }

    /* ---------- ইন্টারনেট / এরর স্ক্রিন ---------- */
    #error-screen {
      position: fixed; inset: 0; z-index: 998; display: none;
      background: #1b4332; color: #fff; flex-direction: column;
      align-items: center; justify-content: center; text-align: center; padding: 24px;
      font-family: 'Hind Siliguri', sans-serif;
    }
    #error-screen.show { display: flex; }
    #error-screen .icon { font-size: 46px; margin-bottom: 14px; }
    #error-screen h2 { font-size: 18px; margin-bottom: 8px; }
    #error-screen p { font-size: 14px; opacity: 0.85; max-width: 300px; margin-bottom: 20px; }
    #retry-btn {
      background: #fff; color: #1b4332; border: none; padding: 12px 26px;
      border-radius: 8px; font-weight: 700; font-size: 14px; cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- ============================================================
       নিচের APP_URL এই একটা লাইন বদলালেই যথেষ্ট।
       আপনার Google Apps Script ডিপ্লয় করার পর যে /exec লিংক
       পাবেন সেটা এখানে বসান।
  ============================================================ -->
  <script>
    var APP_URL = "https://script.google.com/macros/s/AKfycbwG219Z4kJty-URRc-7uz5ZQ-ixJQHevn_dr27pUcxINgI1DUS8Bh89vwpaGrrV-IyNHg/exec";
  </script>

  <div id="loading-screen">
    <div class="logo-emoji">💰</div>
    <div class="app-name">আমার ফাইন্যান্স</div>
    <div class="spinner"></div>
    <div class="load-msg">লোড হচ্ছে...</div>
  </div>

  <div id="error-screen">
    <div class="icon">📡</div>
    <h2>লোড করা যায়নি</h2>
    <p>ইন্টারনেট সংযোগ চেক করুন অথবা কিছুক্ষণ পর আবার চেষ্টা করুন।</p>
    <button id="retry-btn">🔄 আবার চেষ্টা করুন</button>
  </div>

  <iframe id="app-frame" src="" title="আমার ফাইন্যান্স" allow="clipboard-write"></iframe>

  <script>
    var frame = document.getElementById('app-frame');
    var loadingScreen = document.getElementById('loading-screen');
    var errorScreen = document.getElementById('error-screen');
    var loadTimeout;

    function loadApp() {
      errorScreen.classList.remove('show');
      loadingScreen.classList.remove('hidden');
      frame.src = APP_URL + (APP_URL.indexOf('?') > -1 ? '&' : '?') + 't=' + new Date().getTime();

      clearTimeout(loadTimeout);
      loadTimeout = setTimeout(function () {
        loadingScreen.classList.add('hidden');
        errorScreen.classList.add('show');
      }, 15000); // ১৫ সেকেন্ডে লোড না হলে এরর স্ক্রিন দেখাবে
    }

    frame.addEventListener('load', function () {
      clearTimeout(loadTimeout);
      loadingScreen.classList.add('hidden');
      errorScreen.classList.remove('show');
    });

    document.getElementById('retry-btn').addEventListener('click', loadApp);

    // অ্যাপ প্রথমবার খোলার সাথে সাথেই লোড শুরু
    loadApp();

    // ব্যাক বাটনে যাতে পুরো পেজ বন্ধ না হয়ে যায়, তার জন্য সাধারণ হ্যান্ডলিং (Android WebView এর জন্য সহায়ক)
    document.addEventListener('backbutton', function (e) {
      e.preventDefault();
      if (frame.contentWindow) { frame.contentWindow.history.back(); }
    }, false);
  </script>

</body>
</html>
